<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tags — Vasil Abdul Razak</title>
  <meta name="description" content="All tags used across blog posts." />
  <meta name="robots" content="index, follow" />
  <link rel="icon" type="image/png" href="/imgs/avatar.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <script>document.documentElement.className=localStorage.getItem("theme")||"light"</script>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Tags" />
  <meta property="og:site_name" content="Vasil Abdul Razak" />
</head>
<body>
  <header class="site-header">
    <div class="shell topbar">
      <a class="brand" href="/" aria-label="Vasil Abdul Razak home">
        <span class="brand-name">Vasil Abdul Razak</span>
        <span class="brand-role">Backend Engineer</span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav" aria-label="Open navigation">
        <span class="nav-toggle-lines" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
      <nav id="primary-nav" class="nav" aria-label="Primary">
        <a href="/#overview">Overview</a>
        <a href="/#experience">Experience</a>
        <a href="/#projects">Projects</a>
        <a href="/#skills">Skills</a>
        <a href="/blog">Blog</a>
        <a href="/#contact">Contact</a>
        <select id="theme-picker" class="theme-picker" aria-label="Theme" title="Theme (press / to open)">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="catppuccin">Catppuccin</option>
          <option value="tokyo-night">Tokyo Night</option>
          <option value="dracula">Dracula</option>
          <option value="nord">Nord</option>
          <option value="gruvbox">Gruvbox</option>
          <option value="rose-pine">Rose Pine</option>
        </select>
      </nav>
    </div>
  </header>
  <main class="shell">
    <section class="blog-index">
      <div class="section-head">
        <div class="micro-label">Browse</div>
        <h2>Tags.</h2>
        <p>All tags used across blog posts.</p>
      </div>
      <div class="post-list" style="margin-top: 32px;">
        {% for tag in terms %}
          <article class="post-card">
            <h3><a href="{{ tag.permalink }}">{{ tag.name }}</a></h3>
            <p><strong>{{ tag.pages | length }}</strong> post{{ tag.pages | length | pluralize }}</p>
          </article>
        {% endfor %}
      </div>
    </section>
  </main>
  <footer class="shell footer">
    <div>Copyright &copy; 2026 Vasil Abdul Razak.</div>
    <div class="footer-links">
        <a href="/">Home</a>
      <a href="/blog">Blog</a>
    </div>
  </footer>
  <script src="/script.js"></script>
</body>
</html>
